name: clinova
description: Offline-first patient data capture and sync for rural health outreach.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # Database — local SQLite via Drift ORM
  drift: ^2.23.0
  drift_sqflite: ^2.0.1      # mobile SQLite adapter
  sqflite: ^2.4.0
  sqlite3: ^2.9.0               # direct import for web WASM setup
  sqlcipher_flutter_libs: ^0.5.0  # SQLCipher native libs (all platforms, encrypted)

  # Sync hub (embedded HTTP server, runs on hub device)
  shelf: ^1.4.0
  shelf_router: ^1.1.0

  # HTTP client (sync client → hub)
  http: ^1.2.0

  # State management
  flutter_riverpod: ^2.6.0
  riverpod_annotation: ^2.6.0

  # Routing
  go_router: ^14.0.0

  # Secure key & token storage
  flutter_secure_storage: ^9.0.0

  # Collision-free IDs generated offline
  uuid: ^4.5.0

  # Export
  csv: ^6.0.0
  pdf: ^3.11.0
  printing: ^5.13.0

  # Utilities
  path: ^1.9.0
  path_provider: ^2.1.0
  intl: ^0.19.0
  crypto: ^3.0.0   # PIN hashing

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.23.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.6.0

flutter:
  uses-material-design: true
